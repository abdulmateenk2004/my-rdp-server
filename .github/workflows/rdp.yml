name: USA High Speed RDP
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
    - name: Enable Windows Remote Desktop (RDP)
      shell: powershell
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
    - name: Download and Connect Tailscale
      shell: powershell
      run: |
        iex (IWR 'https://tailscale.com/install.ps1' -UseBasicParsing)
        tailscale up --authkey=tskey-auth-ku1TgFN39s11CNTRL-im2YdLucP3SbDvArAnsL3Sv9NoDJugXR
    - name: Keep RDP Alive
      shell: powershell
      run: |
        $seconds = 21600
        while ($seconds -gt 0) {
            Write-Output "RDP Active hai... Remaining: $seconds seconds"
            Start-Sleep -Seconds 60
            $seconds -= 60
        }
