name: Ngrok High Speed RDP
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Configure RDP Settings
      run: |
        powershell -Command "Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name 'fDenyTSConnections' -Value 0"
        powershell -Command "Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name 'UserAuthentication' -Value 0"
        powershell -Command "Enable-NetFirewallRule -DisplayGroup 'Remote Desktop'"
        powershell -Command "net user runneradmin MateenRDP123! /add"
        powershell -Command "net localgroup administrators runneradmin /add"

    - name: Download and Extract Ngrok
      run: |
        powershell -Command "Invoke-WebRequest -Uri 'https://bin.equinox.io/c/b34edq65oax/ngrok-stable-windows-amd64.zip' -OutFile 'ngrok.zip'"
        powershell -Command "Expand-Archive -Path 'ngrok.zip' -DestinationPath '.'"

    - name: Authenticate & Start Ngrok Tunnel
      run: |
        .\ngrok.exe authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        start-process .\ngrok.exe -ArgumentList "tcp 3389"

    - name: Display Connection Details & Keep Alive
      run: |
        powershell -Command "Start-Sleep -Seconds 10"
        powershell -Command "$response = Invoke-RestMethod -Uri 'http://127.0.0.1:4040/api/tunnels'; $url = $response.tunnels.public_url; Write-Output '========================================'; Write-Output 'Aapki RDP Details Yeh Hain:'; Write-Output 'Address:' $url; Write-Output 'Username: runneradmin'; Write-Output 'Password: MateenRDP123!'; Write-Output '========================================'"
        powershell -Command "$seconds = 21600; while ($seconds -gt 0) { Start-Sleep -Seconds 60; $seconds -= 60 }"
